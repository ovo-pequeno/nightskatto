name: daily-2ch-sukatto

on:
  schedule:
    # UTC 11:29 = JST 20:29ごろ。1日1本。:00を避けて混雑回避。
    - cron: "29 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-2ch-sukatto
  cancel-in-progress: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (ffmpeg / ImageMagick / fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick fonts-noto-cjk
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>//' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>//' /etc/ImageMagick-7/policy.xml || true

      - name: Install python deps
        run: pip install -r requirements.txt

      - name: Generate and upload (2ch sukatto)
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          # 2chスカッと用チャンネルのSecretを使う（他チャンネルと別アカウントなら別途取得）
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          PRIVACY: "public"     # 最初は unlisted で試すのも手
        run: python generate_2ch_sukatto.py

      - name: Commit dedup log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_log_2ch.json
          git commit -m "update 2ch dedup log [skip ci]" || echo "no changes"
          git pull --rebase origin main
          git push
