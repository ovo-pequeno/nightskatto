name: daily-2ch-shorts

on:
  schedule:
    - cron: "13 22 * * *"   # JST  7:13
    - cron: "27 0 * * *"    # JST  9:27
    - cron: "43 2 * * *"    # JST 11:43
    - cron: "19 4 * * *"    # JST 13:19
    - cron: "37 6 * * *"    # JST 15:37
    - cron: "23 8 * * *"    # JST 17:23
    - cron: "47 10 * * *"   # JST 19:47
    - cron: "33 12 * * *"   # JST 21:33
    - cron: "17 14 * * *"   # JST 23:17
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-2ch-shorts
  cancel-in-progress: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system deps (ffmpeg / ImageMagick / fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick fonts-noto-cjk
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>//' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>//' /etc/ImageMagick-7/policy.xml || true

      - name: Install python deps
        run: pip install -r requirements.txt

      - name: Generate and upload (2ch shorts)
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          PRIVACY: "public"
        run: python generate_2ch_shorts.py

      - name: Commit dedup log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_log_2ch_shorts.json
          git commit -m "update 2ch shorts dedup log [skip ci]" || echo "no changes"
          git pull --rebase origin main
          git push
